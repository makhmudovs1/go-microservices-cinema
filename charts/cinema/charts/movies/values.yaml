# Значения по умолчанию для movies.
# Это файл в формате YAML.
# Объявите переменные, которые будут переданы в шаблоны.

replicaCount: 1

image:
  repository: cinema-movies
  pullPolicy: IfNotPresent
  # Переопределяет тег образа, который по умолчанию равен appVersion чарта.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Укажите параметры, используемые для запуска сервиса
args: []

serviceAccount:
  # Указывает, нужно ли создавать service account
  create: true
  # Аннотации, добавляемые к service account
  annotations: {}
  # Имя service account, который нужно использовать.
  # Если не задано и create равно true, имя генерируется через шаблон fullname
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths: []
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # Обычно рекомендуется не задавать ресурсы по умолчанию и оставить это осознанным
  # выбором пользователя. Это также повышает шанс запуска чартов в средах с небольшими
  # ресурсами, например Minikube. Если ресурсы все же нужно задать, раскомментируйте следующие
  # строки, настройте их при необходимости и удалите фигурные скобки после resources:.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
